<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyPulse — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0a0c10; --gold: #c9a84c; --gold-light: #e8c96a;
      --border: rgba(201,168,76,0.22); --text-dim: rgba(255,255,255,0.50);
      --card: #131820; --red: #e8625a; --green: #2ecc8a;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(160deg, #0a0c10, #0d1a2e 50%, #0a1628);
      min-height: 100vh; color: #fff;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .wrap { width: 100%; max-width: 420px; }

    .logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 36px; }
    .logo-icon { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--gold); }
    .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--gold); letter-spacing: 0.08em; }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px; position: relative; overflow: hidden;
    }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }

    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; margin-bottom: 6px; }
    .card-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 32px; line-height: 1.6; }

    .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
    .alert-error   { background: rgba(232,98,90,0.12);  border: 1px solid rgba(232,98,90,0.3);  color: #e8625a; }
    .alert-success { background: rgba(46,204,138,0.12); border: 1px solid rgba(46,204,138,0.3); color: #2ecc8a; }

    .form-group { margin-bottom: 20px; }
    .form-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 8px; }
    .form-input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: #fff; font-size: 14px; font-family: 'DM Sans', sans-serif;
      transition: border-color 0.18s; outline: none;
    }
    .form-input:focus { border-color: var(--gold); }

    .forgot { text-align: right; margin-top: 6px; }
    .forgot a { font-size: 12px; color: var(--text-dim); text-decoration: none; }
    .forgot a:hover { color: var(--gold); }

    .btn {
      width: 100%; padding: 15px; margin-top: 8px;
      background: var(--gold); color: #0a0c10;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }

    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
    .divider span { font-size: 12px; color: var(--text-dim); }

    .footer-link { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-dim); }
    .footer-link a { color: var(--gold); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }

    .home-link { text-align: center; margin-top: 16px; font-size: 12px; }
    .home-link a { color: var(--text-dim); text-decoration: none; }
    .home-link a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div class="logo-text">SkyPulse</div>
    </div>

    <div class="card">
      <div class="card-title">Welcome back</div>
      <p class="card-sub">Sign in to access your dashboard and bookings.</p>

      <div th:if="${errorMsg}"   class="alert alert-error"   th:text="${errorMsg}"></div>
      <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

      <!-- Spring Security reads name="username" and name="password" -->
      <form method="post" th:action="@{/login}">

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="username" class="form-input"
                 placeholder="you@example.com" required/>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input"
                 placeholder="Your password" required/>
          <div class="forgot"><a href="#">Forgot password?</a></div>
        </div>

        <button type="submit" class="btn">Sign In →</button>
      </form>
    </div>

    <div class="footer-link">
      Don't have an account? <a th:href="@{/register}">Create one</a>
    </div>
    <div class="home-link">
      <a th:href="@{/}">← Back to home</a>
    </div>
  </div>
</body>
</html>
