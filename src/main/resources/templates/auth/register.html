<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyPulse — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0a0c10; --gold: #c9a84c; --gold-light: #e8c96a;
      --border: rgba(201,168,76,0.22); --text-dim: rgba(255,255,255,0.50);
      --card: #131820; --red: #e8625a; --green: #2ecc8a;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(160deg, #0a0c10, #0d1a2e 50%, #0a1628);
      min-height: 100vh; color: #fff;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .wrap { width: 100%; max-width: 460px; }

    .logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 36px; }
    .logo-icon { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--gold); }
    .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--gold); letter-spacing: 0.08em; }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px; position: relative; overflow: hidden;
    }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }

    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; margin-bottom: 6px; }
    .card-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 32px; line-height: 1.6; }

    .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
    .alert-error { background: rgba(232,98,90,0.12); border: 1px solid rgba(232,98,90,0.3); color: #e8625a; }
    .alert-success { background: rgba(46,204,138,0.12); border: 1px solid rgba(46,204,138,0.3); color: #2ecc8a; }

    .form-group { margin-bottom: 20px; }
    .form-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 8px; }
    .form-input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: #fff; font-size: 14px; font-family: 'DM Sans', sans-serif;
      transition: border-color 0.18s;
      outline: none;
    }
    .form-input:focus { border-color: var(--gold); }
    .form-input.error { border-color: var(--red); }
    .field-error { font-size: 11px; color: var(--red); margin-top: 5px; }

    .btn {
      width: 100%; padding: 15px; margin-top: 8px;
      background: var(--gold); color: #0a0c10;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }

    .footer-link { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-dim); }
    .footer-link a { color: var(--gold); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div class="logo-text">SkyPulse</div>
    </div>

    <div class="card">
      <div class="card-title">Create Account</div>
      <p class="card-sub">Join SkyPulse to track flights and book tickets.</p>

      <!-- Error from service (email taken, passwords mismatch) -->
      <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>

      <form method="post" th:action="@{/register}" th:object="${registerDto}">
        <!-- CSRF token auto-injected by Thymeleaf + Spring Security -->

        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" th:field="*{name}"
                 th:classappend="${#fields.hasErrors('name')} ? 'error'"
                 placeholder="Ajeet Kumar"/>
          <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" th:field="*{email}"
                 th:classappend="${#fields.hasErrors('email')} ? 'error'"
                 placeholder="you@example.com"/>
          <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" th:field="*{password}"
                 th:classappend="${#fields.hasErrors('password')} ? 'error'"
                 placeholder="Minimum 6 characters"/>
          <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" th:field="*{confirmPassword}"
                 th:classappend="${#fields.hasErrors('confirmPassword')} ? 'error'"
                 placeholder="Repeat your password"/>
          <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>

        <button type="submit" class="btn">Create Account →</button>
      </form>
    </div>

    <div class="footer-link">
      Already have an account? <a th:href="@{/login}">Sign in</a>
    </div>
  </div>
</body>
</html>
